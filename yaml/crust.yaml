apiVersion: v1
kind: Namespace
metadata:
  name: crust
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crust-deployment
  namespace: crust
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crust
  template:
    metadata:
      labels:
        app: crust
    spec:
      containers:
      - name: crust
        image: ghcr.io/m-sef/crust:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        resources:
            requests:
              cpu: "9000m"
            limits:
              cpu: "10000m"
---
apiVersion: v1
kind: Service
metadata:
  name: crust-service
  namespace: crust
spec:
  selector:
    app: crust
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: crust-hpa
  namespace: crust
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: crust-deployment
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
